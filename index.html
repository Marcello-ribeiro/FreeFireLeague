<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ranking - FFLG</title>
  <link rel="icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <section class="hero">
    <div>
      <span class="badge">🔥 Liga Free Fire</span>
      <h1>FFLG Championship</h1>
      <p>Ranking, confrontos e resultados atualizados em tempo real.</p>
    </div>
  </section>

  <main>
    <section class="stats-grid">
      <div class="mini-card">
        <span>🏆</span>
        <strong id="totalPlayers">0</strong>
        <p>Jogadores</p>
      </div>

      <div class="mini-card">
        <span>🟡</span>
        <strong id="totalPending">0</strong>
        <p>Pendentes</p>
      </div>

      <div class="mini-card">
        <span>🔵</span>
        <strong id="totalFinished">0</strong>
        <p>Finalizadas</p>
      </div>
    </section>

    <section class="card ranking-card">
      <h2>🏆 Ranking</h2>
      <div id="ranking"></div>
    </section>

    <section class="card">
      <h2>⚔️ Confrontos</h2>

      <div class="filters">
        <input id="searchPlayer" placeholder="Buscar jogador">
        <button onclick="filtrarPartidas()">Buscar</button>
        <button onclick="limparFiltro()">Limpar</button>
      </div>

      <div id="matches"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
