<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FFLG Championship</title>

<link rel="icon" href="favicon.ico">
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<section class="hero">
  <div class="hero-content">

    <span class="badge">Free Fire League</span>

    <h1>FFLG Championship</h1>

    <p>
      Ranking atualizado em tempo real, confrontos,
      resultados e estatísticas dos jogadores.
    </p>

  </div>
</section>

<main>

  <section class="stats-grid">

    <div class="mini-card">
      <span class="icon">🤺</span>
      <strong id="totalPlayers">0</strong>
      <p>Jogadores</p>
    </div>

    <div class="mini-card">
      <span class="icon">🌐</span>
      <strong id="totalPending">0</strong>
      <p>Pendentes</p>
    </div>

    <div class="mini-card">
      <span class="icon">✅</span>
      <strong id="totalFinished">0</strong>
      <p>Finalizadas</p>
    </div>

  </section>

  <section class="card ranking-card">

    <div class="section-title">
      <h2>🏆 Ranking Oficial</h2>
    </div>

    <div id="ranking"></div>

  </section>

  <section class="card">

    <div class="section-title">
      <h2>⚔️ Confrontos</h2>
    </div>

    <div class="filters">

      <input
        id="searchPlayer"
        placeholder="Buscar jogador..."
      >

      <button onclick="filtrarPartidas()">
        Buscar
      </button>

      <button onclick="limparFiltro()">
        Limpar
      </button>

    </div>

    <div id="matches"></div>

  </section>

</main>

<script src="script.js"></script>

</body>
</html>
