<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ranking - FFLG</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header>
    <h1>🏆 FFLG</h1>
    <button onclick="logout()">Sair</button>
  </header>

  <main>
    <section class="card">
      <h2>Ranking</h2>
      <div id="ranking"></div>
    </section>

    <section class="card">
      <h2>Confrontos</h2>
      <div id="matches"></div>
    </section>
  </main>

<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal-box">
    <h2 id="modalTitle">Confirmação</h2>
    <p id="modalText"></p>

    <input id="modalInput" class="hidden" placeholder="Digite aqui">

    <div class="modal-actions">
      <button class="danger-btn" id="modalConfirm">Confirmar</button>
      <button id="modalCancel">Cancelar</button>
    </div>
  </div>
</div>

  <script src="script.js"></script>
</body>
</html>
