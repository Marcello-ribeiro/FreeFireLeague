<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - FFLG</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-body">
  <div class="login-box">
    <h1>🏆 FFLG</h1>
    <p>Entre com seu usuário e senha</p>

    <input id="loginUser" placeholder="Usuário">
    <input id="loginPass" type="password" placeholder="Senha">

    <button onclick="login()">Entrar</button>
    <span id="loginMsg"></span>
  </div>

<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal-box">
    <h2 id="modalTitle">Confirmação</h2>
    <p id="modalText"></p>

    <input id="modalInput" class="hidden" placeholder="Digite aqui">

    <div class="modal-actions">
      <button class="danger-btn" id="modalConfirm">Confirmar</button>
      <button id="modalCancel">Cancelar</button>
    </div>
  </div>
</div>

<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal-box">
    <h2 id="modalTitle">Confirmação</h2>
    <p id="modalText"></p>

    <input id="modalInput" class="hidden" placeholder="Digite aqui">

    <div class="modal-actions">
      <button class="danger-btn" id="modalConfirm">Confirmar</button>
      <button id="modalCancel">Cancelar</button>
    </div>
  </div>
</div>

  <script src="script.js"></script>
</body>
</html>
