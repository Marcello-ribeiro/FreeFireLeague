<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - FFLG</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header>
    <h1>⚙️ Painel Admin</h1>
    <button onclick="logout()">Sair</button>
  </header>

  <main>
    <section class="card">
      <h2>Criar Jogador</h2>

      <input id="newUser" placeholder="Usuário">
      <input id="newPass" placeholder="Senha">

      <select id="newPlatform">
        <option value="Mobile">📱 Mobile</option>
        <option value="Emulador">🖥️ Emulador</option>
      </select>

      <button onclick="criarJogador()">Criar jogador</button>
    </section>

    <section class="card">
      <h2>Jogadores</h2>
      <div id="ranking"></div>
    </section>

   <section class="card">
  <h2>Confrontos</h2>
  <button onclick="gerarConfrontos()">Gerar confrontos</button>
  <div id="adminMatches"></div>
</section>

<section class="card danger-zone">
  <h2>Zona de Reset</h2>

  <button class="danger-btn" onclick="resetarResultados()">
    Resetar resultados e ranking
  </button>

  <button class="danger-btn" onclick="apagarConfrontos()">
    Apagar todos os confrontos
  </button>

  <button class="danger-btn" onclick="apagarTudo()">
    Apagar jogadores + confrontos
  </button>
</section>

  </main>


  <div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal-box">
    <h2 id="modalTitle">Confirmação</h2>
    <p id="modalText"></p>

    <input id="modalInput" class="hidden" placeholder="Digite aqui">

    <div class="modal-actions">
      <button class="danger-btn" id="modalConfirm">Confirmar</button>
      <button id="modalCancel">Cancelar</button>
    </div>
  </div>
</div>

  <script src="script.js"></script>
</body>
</html>
